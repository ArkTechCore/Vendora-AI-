{% extends "base.html" %}
{% block title %}Security | VendoraOps{% endblock %}
{% block heading %}Security{% endblock %}
{% block content %}
<form method="post" class="card form-card auth-card">
  {% csrf_token %}
  <h2>Change Password</h2>
  <p class="muted">Use a strong password that is not shared with your POS, email, or banking logins.</p>
  {{ form.as_p }}
  <div class="form-actions">
    <button class="button primary" type="submit">Update Password</button>
    <a class="button ghost" href="{% url 'dashboard' %}">Cancel</a>
  </div>
</form>
{% endblock %}
