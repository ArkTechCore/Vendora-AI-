{% extends "base.html" %}
{% load static %}
{% block title %}Password Reset Complete | VendoraOps{% endblock %}
{% block content %}
<section class="login-panel">
  <div class="login-brand">
    <span class="brand-mark large image-mark"><img src="{% static 'img/vendoraops-logo.jpeg' %}" alt="VendoraOps logo"></span>
    <h1>Password Reset Complete</h1>
    <p>You can now sign in with your new VendoraOps password.</p>
  </div>
  <section class="card form-card auth-card">
    <h2>Ready to sign in</h2>
    <a class="button primary" href="{% url 'login' %}">Go to Login</a>
  </section>
</section>
{% endblock %}
